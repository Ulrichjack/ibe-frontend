<!-- Conteneur avec animation de pulsation (Pulse) pour attirer l'œil élégamment -->
<div class="fixed bottom-6 right-6 z-50 group flex items-center gap-4">

  <!-- Tooltip Luxe -->
  <div class="hidden md:block opacity-0 translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 bg-white px-4 py-2 rounded-xl shadow-[0_4px_20px_rgba(34,27,46,0.1)] border border-ibe-100">
    <p class="text-sm font-medium text-ibe-dark m-0">Besoin d'aide ?</p>
    <p class="text-xs text-ibe-muted m-0">Discutons sur WhatsApp</p>
  </div>

  <!-- Bouton -->
  <a [href]="waLink()"
     target="_blank"
     rel="noopener noreferrer"
     class="relative flex items-center justify-center w-14 h-14 bg-ibe-wa rounded-full shadow-[0_8px_24px_rgba(37,211,102,0.4)] hover:scale-110 transition-transform duration-300"
     aria-label="Contacter IBE sur WhatsApp">

    <!-- Cercle d'onde derrière le bouton -->
    <span class="absolute inset-0 rounded-full bg-ibe-wa animate-ping opacity-75"></span>

    <!-- Icône SVG -->
    <svg viewBox="0 0 24 24" fill="white" width="30" height="30" class="relative z-10">

  </a>
</div>
