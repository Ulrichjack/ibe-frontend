<!-- Conteneur fixe en haut à droite -->
<div class="fixed top-24 right-4 z-[100] flex flex-col gap-3 pointer-events-none">

  @for (toast of toastService.toasts(); track toast.id) {
    <div class="pointer-events-auto w-80 bg-white rounded-xl shadow-[0_8px_30px_rgba(34,27,46,0.12)] border border-ibe-100 overflow-hidden animate-in slide-in-from-right-8 fade-in duration-300 flex items-stretch">

      <!-- Bande de couleur latérale & Icône selon le type -->
      <div class="w-12 flex items-center justify-center shrink-0"
           [class.bg-ibe-success]="toast.type === 'success'"
           [class.bg-ibe-danger]="toast.type === 'error'"
           [class.bg-ibe-warning]="toast.type === 'warning'"
           [class.bg-ibe-500]="toast.type === 'info'">

        @if (toast.type === 'success') { <svg lucideCheck class="text-white" [size]="20"></svg> }
        @if (toast.type === 'error') { <svg lucideX class="text-white" [size]="20"></svg> }
        @if (toast.type === 'warning') { <svg lucideTriangleAlert class="text-white" [size]="20"></svg> }
        @if (toast.type === 'info') { <svg lucideCircleAlert class="text-white" [size]="20"></svg> }
      </div>

      <!-- Message et Bouton Fermer -->
      <div class="flex-grow p-3 flex items-start justify-between gap-2 bg-white">
        <p class="text-sm font-medium text-ibe-dark m-0 leading-snug">{{ toast.message }}</p>
        <button (click)="toastService.remove(toast.id)" class="text-ibe-muted hover:text-ibe-dark transition-colors shrink-0 mt-0.5">
          <svg lucideX [size]="16"></svg>
        </button>
      </div>

      <!-- Barre de progression animée (4 secondes) -->
      <div class="absolute bottom-0 left-0 h-1 bg-black/10 w-full">
        <div class="h-full animate-[shrink_4s_linear_forwards]"
             [class.bg-ibe-success]="toast.type === 'success'"
             [class.bg-ibe-danger]="toast.type === 'error'"
             [class.bg-ibe-warning]="toast.type === 'warning'"
             [class.bg-ibe-500]="toast.type === 'info'">
        </div>
      </div>
    </div>
  }
</div>
