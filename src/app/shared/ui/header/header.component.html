<!-- Header Fixe avec effet Glassmorphism (Verre dépoli) au scroll -->
<header
  class="fixed top-0 w-full z-50 transition-all duration-300"
  [class]="isScrolled() ? 'bg-white/95 backdrop-blur-md shadow-sm py-2' : 'bg-white py-3'">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-14 md:h-16">

      <!-- Logo & Nom de l'Institut (Taille Réduite) -->
      <a routerLink="/" class="flex items-center gap-3 group" (click)="closeMenu()">
        <div class="w-18 h-18 md:w-18 md:h-18 rounded-full overflow-hidden border border-ibe-200 shadow-sm group-hover:shadow-md transition-all duration-300">
          <img src="assets/img/logo-ibe.png" alt="Logo IBE" class="w-full h-full object-cover" width="48" height="48">
        </div>
        <div class="flex flex-col">
          <span class="font-sans font-bold text-ibe-dark text-base md:text-lg leading-none tracking-wide group-hover:text-ibe-500 transition-colors duration-300">
            Beauty's Empire
          </span>
          <span class="font-sans text-[9px] uppercase tracking-[0.15em] text-ibe-muted mt-0.5">
            Institut de Beauté
          </span>
        </div>
      </a>

      <!-- Navigation Desktop (Luxe : liens épurés avec soulignement animé) -->
       <nav class="hidden md:flex items-center gap-10">
        <a routerLink="/" routerLinkActive="text-ibe-600 after:scale-x-100" [routerLinkActiveOptions]="{exact: true}"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          Accueil
        </a>
        <a routerLink="/formations" routerLinkActive="text-ibe-600 after:scale-x-100"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          Formations
        </a>
        <a routerLink="/galerie" routerLinkActive="text-ibe-600 after:scale-x-100"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          Galerie
        </a>

        <a routerLink="/a-propos" routerLinkActive="text-ibe-600 after:scale-x-100"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          À propos
        </a>

        <a routerLink="/localisation" routerLinkActive="text-ibe-600 after:scale-x-100"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          Localisation
        </a>

        <a routerLink="/faq" routerLinkActive="text-ibe-600 after:scale-x-100"
           class="relative font-sans text-[15px] font-medium text-ibe-muted hover:text-ibe-600 transition-colors py-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:bg-ibe-500 after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100">
          FAQ
        </a>

      </nav>

      <!-- CTA Desktop -->
      <div class="hidden md:flex">
        <button (click)="openContactModal()" class="btn-primary">
          Nous Contacter
        </button>
      </div>

      <button class="md:hidden p-2 text-ibe-dark" (click)="toggleMenu()" aria-label="Menu">
        @if (isMenuOpen()) { <svg lucideX [size]="28"></svg> } 
        @else { <svg lucideMenu [size]="28"></svg> }
      </button>
    </div>
  </div>

  <!-- Menu Mobile -->
  @if (isMenuOpen()) {
    <div class="md:hidden absolute top-full left-0 w-full bg-white border-b border-ibe-100 shadow-2xl">
      <nav class="flex flex-col py-4">
        <!-- CORRECTION : Ajout de routerLinkActive avec fond et bordure pour le mobile -->
        <a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">Accueil</a>
        <a routerLink="/formations" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">Nos Formations</a>
        <a routerLink="/galerie" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">Galerie</a>
        <a routerLink="/a-propos" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">À propos</a>
        <a routerLink="/localisation" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">Localisation</a>
        <a routerLink="/faq" routerLinkActive="bg-ibe-50 text-ibe-600 border-l-4 border-ibe-500 font-bold" (click)="closeMenu()" class="px-6 py-4 text-lg text-ibe-dark transition-colors duration-200">FAQ</a>
        
        <div class="px-6 mt-4">
          <button (click)="openContactModal(); closeMenu()" class="btn-primary w-full justify-center">Nous Contacter</button>
        </div>
      </nav>
    </div>
  }
</header>

@if (showContactModal()) {
  <app-contact-modal (close)="showContactModal.set(false)" />
}
